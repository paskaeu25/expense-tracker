name: Build Android APK
run-name: "#${{ github.run_number }} - ${{ github.event.head_commit.message }}"

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platforms;android-35 cmdline-tools;latest build-tools;35.0.0'

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'app/package-lock.json'

      - name: Install npm dependencies
        run: npm ci

      - name: Sync web assets
        run: |
          mkdir -p dist
          cp index.html dist/

      - name: Add Android platform
        run: npx cap add android

      - name: Configure Android Auto Backup
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/backup_rules.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <full-backup-content>
              <include domain="sharedpref" path="."/>
              <include domain="database" path="."/>
              <include domain="file" path="."/>
          </full-backup-content>
          EOF
          cat > android/app/src/main/res/xml/data_extraction_rules.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <data-extraction-rules>
              <cloud-backup>
                  <include domain="sharedpref" path="."/>
                  <include domain="database" path="."/>
                  <include domain="file" path="."/>
              </cloud-backup>
              <device-transfer>
                  <include domain="sharedpref" path="."/>
                  <include domain="database" path="."/>
                  <include domain="file" path="."/>
              </device-transfer>
          </data-extraction-rules>
          EOF
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|android:allowBackup="true"|android:allowBackup="true"\n        android:fullBackupContent="@xml/backup_rules"\n        android:dataExtractionRules="@xml/data_extraction_rules"\n        android:requestLegacyExternalStorage="true"|' "$MANIFEST"

      - name: Add storage permissions for external backup
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Add WRITE_EXTERNAL_STORAGE after INTERNET permission
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />|' "$MANIFEST"

      - name: Bump versionCode for over-the-top installation
        run: |
          sed -i "s/versionCode 1/versionCode ${{ github.run_number }}/" android/app/build.gradle

      - name: Cache debug keystore for consistent signing across builds
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-${{ runner.os }}

      - name: Apply status bar styling
        run: |
          FILE="android/app/src/main/res/values/styles.xml"
          sed -i 's|<item name="android:background">@null</item>|<item name="android:background">@null</item>\n        <item name="android:statusBarColor">#f5f5f7</item>\n        <item name="android:windowLightStatusBar">true</item>\n        <item name="android:navigationBarColor">#f5f5f7</item>\n        <item name="android:windowLightNavigationBar">true</item>|' "$FILE"

      - name: Build APK
        run: |
          ./gradlew assembleDebug --stacktrace --no-daemon --console=plain 2>&1 | tee gradle-output.log
          exit ${PIPESTATUS[0]}
        working-directory: app/android

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: expense-tracker-apk
          path: app/android/app/build/outputs/apk/debug/*.apk

      - name: Upload Gradle logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: gradle-logs
          path: app/android/gradle-output.log
